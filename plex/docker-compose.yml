services:
  plex:
    image: lscr.io/linuxserver/plex:1.41.8
    container_name: plex
    hostname: "e7cc804af290"
    networks:
      default:
        ipv4_address: 192.168.100.2
    environment:
      - PUID=1000
      - PGID=1000
      - VERSION=docker
    volumes:
      - "/etc/plex/library:/config"
      - "/mnt/cephfs:/mnt/cephfs:ro"
      - "/mnt/plex/tvseries:/tv"
      - "/mnt/plex/movies:/movies"
      - "/mnt/plex/music:/music"
      - "/mnt/plex/recordings:/recordings"
      - "/mnt/plex:/mnt/qnap"
    ports:
      - 32400:32400
    restart: unless-stopped
    
networks:
  default:
    name: docker-static-vlan100
    external: true
