services:
  portainer:
    image: portainer/portainer-ce:2.39.1
    container_name: portainer
    environment:
      - TZ=Europe/Warsaw
    volumes:
      - /mnt/docker-data/portainer/data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 8000:8000
      - 9000:9000
    restart: always


