services:
  portainer:
    image: portainer/agent:latest
    container_name: portainer_agent
    environment:
      - TZ=Europe/Warsaw
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/docker-data/docker/volumes:/var/lib/docker/volumes
    ports:
      - 9001:9001
    restart: always
